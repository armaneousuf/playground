<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="container">
  <div class="title">
    <h2>Our Reviews</h2>
    <div class="underline"></div>
  </div>

  <article class="review">
    <div class="img-container">
      <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=843&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" id="person-img" alt="" />
    </div>
    <h4 id="author">Sara Jones</h4>
    <p id="job">UX Designer</p>
    <p id="info">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. 
      Quo neque error repudiandae fuga?
    </p>
    
    <!-- Navigation Buttons -->
    <div class="button-container">
      <button class="prev-btn">prev</button>
      <button class="next-btn">next</button>
    </div>
    <button class="random-btn">Surprise Me</button>
  </article>
</section>
<script src="script.js"></script>
</body>
</html>
