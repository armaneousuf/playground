<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card with bottom right</title>

    <style>
      .card {
        width: 200px;
        border: 2px solid red;
        position: relative;
        padding: 10px;
      }

      .action {
        border: 2px solid gray;
        background-color: transparent;
        padding: 3px;

        position: absolute;
        bottom: 0;
        right: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p>Some content...</p>
      <button class="action">Click</button>
    </div>
  </body>
</html>
