<!DOCTYPE html>
<html>
<head>
  <title>Countdown Task</title>
</head>
<body>

  <button id="start-btn">Start Countdown</button>
  <h1 id="message">Waiting...</h1>

  <script>
// Select the elements: Grab the button and the h1 element using their IDs.
// Listen for a click: Add a click event listener to the button.
// Start the countdown: When the button is clicked, immediately change the text of the h1 to "3".
// Wait 1 second: Change the text to "2".
// Wait another second: Change the text to "1".
// Wait one final second: Change the text to "BOOM!".
// YOUR JAVASCRIPT GOES HERE

    const startBTN = document.querySelector('#start-btn');
    const message = document.querySelector('#message');
    // console.log(startBTN, message)

    startBTN.addEventListener('click', () =>{
        message.textContent = '3'; 
        setTimeout(() => {
            message.textContent = '2';
            setTimeout(() => {
                message.textContent = '1'
                setTimeout(() => {
                    message.textContent = 'BOOM'
                }, 1000);
            }, 1000);
        }, 1000);
        
    })
    
  </script>
</body>
</html>
