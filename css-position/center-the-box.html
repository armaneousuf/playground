<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center the box</title>
    <style>
        .container {
          width: 100vw;
          height: 100vh;
          border: 2px solid limegreen;

          position: relative;
        }

        .box {
          height: 25px;
          width: 25px;
          border: 2px solid red;
          
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);

        }
    </style>
</head>
<body>
    <div class="container">
  <div class="box"></div>
</div>
</body>
</html>
