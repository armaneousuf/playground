<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification badge</title>
    <style>
      .btn {
        position: relative;
      }

      .badge {
        position: absolute;
        height: 5px;
        width: 5px;
        background-color: red;
        border-radius: 50%;

        top: -2px;
        right: -2px;
      }
    </style>
</head>
<body>
    <button class="btn">
  Messages
  <span class="badge"></span>
</button>
</body>
</html>
